name: CI

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Type check
      run: npm run typecheck || true
    - name: Build
      run: npm run build || true