    parser: rss
    pools: [INDIA_NATIONAL_BASE, INDIA_WATCHDOG]
    is_active: true

  # ═══════════════════════════════════════════════════════════════
  # INDIA_WATCHDOG — investigations, accountability, rights
  # ═══════════════════════════════════════════════════════════════
  - id: newslaundry
    name: Newslaundry
    type: http
    url: https://www.newslaundry.com/collection/all-stories
    parser: newslaundry
    pools: [INDIA_WATCHDOG]
    is_active: true
  - id: the_wire
    name: The Wire
    type: rss
    url: https://thewire.in/feed
    parser: rss
    pools: [INDIA_WATCHDOG]
    is_active: true
  - id: article14
    name: Article 14
    type: http
    url: https://article-14.com/
    parser: generic_html
    parserConfig:
      listUrl: https://article-14.com/latest
      selectors:
        item: "article"
        title: "h2 a"
        link: "a"
        date: "time"
        desc: "p"
    pools: [INDIA_WATCHDOG]
    is_active: true
  - id: caravan
    name: The Caravan
    type: http
    url: https://caravanmagazine.in/
    parser: generic_html
    parserConfig:
      listUrl: https://caravanmagazine.in/latest
      selectors:
        item: "article"
        title: "h2 a"
        link: "a"
        date: "time"
        desc: "p"
    pools: [INDIA_WATCHDOG]
    is_active: true
  - id: the_news_minute
    name: The News Minute
    type: rss
    url: https://www.thenewsminute.com/feeds/all.xml
    parser: rss
    pools: [INDIA_WATCHDOG, INDIA_REGION]
    is_active: true

  # ═══════════════════════════════════════════════════════════════
  # INDIA_FACTCHECK_DATA — verification, misinformation checks
  # ═══════════════════════════════════════════════════════════════
  - id: indiaspend
    name: IndiaSpend
    type: http
    url: https://www.indiaspend.com/
    parser: generic_html
    parserConfig:
      listUrl: https://www.indiaspend.com/latest
      selectors:
        item: "article"
        title: "h2 a"
        link: "a"
        date: "time"
        desc: "p"
    pools: [INDIA_FACTCHECK_DATA]
    is_active: true
  - id: altnews
    name: Alt News
    type: rss
    url: https://www.altnews.in/feed/
    parser: rss
    pools: [INDIA_FACTCHECK_DATA]
    is_active: true
  - id: boom_live
    name: BOOM Live
    type: http
    url: https://www.boomlive.in/
    parser: generic_html
    parserConfig:
      listUrl: https://www.boomlive.in/fact-check
      selectors:
        item: "article"
        title: "h2 a"
        link: "a"
        date: "time"
        desc: "p"
    pools: [INDIA_FACTCHECK_DATA]
    is_active: true

  # ═══════════════════════════════════════════════════════════════
  # INDIA_BUSINESS_REG — markets, filings, exchange, RBI, SEBI
  # ═══════════════════════════════════════════════════════════════
  - id: nse_circulars
    name: NSE Circulars
    type: http
    url: https://www.nseindia.com/rss-feed
    headers:
      User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
    parser: generic_html
    parserConfig:
      listUrl: https://www.nseindia.com/static/rss-feed
      selectors:
        item: "ul li"
        title: "a"
        link: "a"
    pools: [INDIA_BUSINESS_REG]
    is_active: true
  - id: rbi_notifications
    name: RBI Press Releases
    type: http
    url: https://www.rbi.org.in/Scripts/BS_PressReleaseDisplay.aspx
    headers:
      User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
    parser: generic_html
    parserConfig:
      listUrl: https://www.rbi.org.in/Scripts/BS_PressReleaseDisplay.aspx
      selectors:
        item: "tr"
        title: "a"
        link: "a"
        date: "td:nth-child(1)"
    pools: [INDIA_BUSINESS_REG]
    is_active: true
  - id: sebi_circulars
    name: SEBI Circulars
    type: http
    url: https://www.sebi.gov.in/sebiweb/home/HomeAction.do?doListing=yes&sid=1&ssid=3&smid=0
    headers:
      User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
    parser: generic_html
    parserConfig:
      listUrl: https://www.sebi.gov.in/sebiweb/home/HomeAction.do?doListing=yes&sid=1&ssid=3&smid=0
      selectors:
        item: "tr"
        title: "a"
        link: "a"
        date: "td:nth-child(1)"
    pools: [INDIA_BUSINESS_REG]
    is_active: true

