    is_active: true

  # ═══════════════════════════════════════════════════════════════
  # GLOBAL_LAW_REG — sanctions, courts, regulatory actions
  # ═══════════════════════════════════════════════════════════════
  - id: ofac_recent_actions
    name: OFAC Recent Actions
    type: http
    url: https://ofac.treasury.gov/recent-actions
    headers:
      User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
      Accept: application/rss+xml
    parser: ofac
    pools: [GLOBAL_LAW_REG, GLOBAL_GEOECON]
    is_active: true
  - id: lawfare
    name: Lawfare
    type: rss
    url: https://www.lawfaremedia.org/feeds/articles
    parser: rss
    pools: [GLOBAL_LAW_REG, GLOBAL_GEOECON]
    is_active: true

  # ═══════════════════════════════════════════════════════════════
