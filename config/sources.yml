sources:
  # ═══════════════════════════════════════════════════════════════
  # GLOBAL_BREAKING — fast, low-spin event detection
  # ═══════════════════════════════════════════════════════════════
  - id: reuters
    name: "Reuters (via Google News)"
    type: rss
    url: https://news.google.com/rss/search?q=site%3Areuters.com&hl=en-US&gl=US&ceid=US%3Aen
    parser: rss
    pools: [GLOBAL_BREAKING]
    is_active: true
  - id: reuters_india
    name: "Reuters India"
    type: rss
    url: https://news.google.com/rss/search?q=site%3Areuters.com+india&hl=en-US&gl=US&ceid=US%3Aen
    parser: rss
    pools: [GLOBAL_BREAKING, INDIA_NATIONAL_BASE]
    is_active: true
  - id: bbc_world
    name: "BBC World News"
    type: rss
    url: https://feeds.bbci.co.uk/news/world/rss.xml
    parser: rss
    pools: [GLOBAL_BREAKING]
    is_active: true
  - id: bbc_india
    name: "BBC News India"
    type: rss
    url: https://feeds.bbci.co.uk/news/world/asia/india/rss.xml
    parser: rss
    pools: [GLOBAL_BREAKING, INDIA_NATIONAL_BASE]
    is_active: true
  - id: ft
    name: "Financial Times"
    type: rss
    url: https://www.ft.com/rss/home
    parser: rss
    pools: [GLOBAL_BREAKING, GLOBAL_GEOECON]
    is_active: true
  - id: aljazeera
    name: Al Jazeera
    type: rss
    url: https://www.aljazeera.com/xml/rss/all.xml
    parser: rss
    pools: [GLOBAL_BREAKING]
    is_active: true
  - id: nikkei_asia
    name: Nikkei Asia
    type: rss
    url: https://asia.nikkei.com/rss/feed/nar
    parser: rss
    pools: [GLOBAL_BREAKING, GLOBAL_GEOECON]
    is_active: true
  - id: straits_times
    name: Straits Times
    type: rss
    url: https://www.straitstimes.com/news/world/rss.xml
    parser: rss
    pools: [GLOBAL_BREAKING]
    is_active: true

  # ═══════════════════════════════════════════════════════════════
  # GLOBAL_GEOECON — geopolitics, sanctions, strategic competition
  # ═══════════════════════════════════════════════════════════════
  - id: war_on_the_rocks
